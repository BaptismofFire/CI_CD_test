# .github/workflows/cicd.yml
name: Deploy HTML to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Upload latest HTML
    runs-on: ubuntu-latest

    steps:
      # Intent: Get latest repo files
      - name: Checkout code
        uses: actions/checkout@v4

      # Intent: Verify index.html exists before upload
      - name: Check index.html
        run: test -f index.html

      # Intent: Upload latest website files to Nginx web root
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "index.html"
          target: "/var/www/aisontech.org/"
